<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đoán Tiền Lì Xì</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* Video nền */
        .background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        /* Container nội dung */
        .container {
            position: relative;
            text-align: center;
            color: white;
            margin-top: 50px;
            z-index: 1;
        }

        h1 {
            font-size: 2.5em;
            color: #ffd700;
            text-shadow: 2px 2px 5px #000;
        }

        button {
            background-color: #ff5733;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            margin: 10px 0;
            transition: background-color 0.3s;
            display: block;
            width: 200px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        }

        button:hover {
            background-color: #c70039;
        }

        .result-box {
            margin-top: 20px;
            padding: 10px;
            font-size: 18px;
            border: 1px solid #ddd;
            border-radius: 5px;
            display: inline-block;
            background-color: rgba(255, 255, 255, 0.8);
            min-width: 150px;
            color: #34495e;
        }
    </style>
</head>
<body>
    <!-- Video nền -->
    <video class="background-video" autoplay loop muted>
        <source src="fireworks loop.mp4" type="video/mp4">
        Trình duyệt của bạn không hỗ trợ video.
    </video>
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    <!-- Nội dung -->
    <div class="container">
        <h1>Đoán Tiền Lì Xì</h1>
        
        <div class="result-box" id="result">...</div>
        <button id="guessButton">Đoán</button>
          <a href="index.html">Trở về Trang Chủ</a>
    </div>

    <script>
        const guessButton = document.getElementById('guessButton');
        const resetButton = document.getElementById('resetButton');
        const resultBox = document.getElementById('result');

        // Danh sách các số tiền lì xì đẹp
        const luckyAmounts = [5000, 10000, 20000, 50000, 100000, 200000, 500000, 1000000, 2000000];

        // Xử lý khi bấm nút "Đoán"
        guessButton.addEventListener('click', () => {
            const randomIndex = Math.floor(Math.random() * luckyAmounts.length);
            const luckyAmount = luckyAmounts[randomIndex];
            resultBox.textContent = `${luckyAmount} VNĐ`;
        });

        // Xử lý khi bấm nút "Trở về Index"
        resetButton.addEventListener('click', () => {
            resultBox.textContent = '...';
        });
    </script>
</body>
</html>
