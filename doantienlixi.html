<div class="container">
  <h1>Đoán Tiền Lì Xì</h1>
  <button onclick="checkGuess()">Kiểm tra</button>
  <p id="result"></p>
</div>
<script>
function checkGuess() {
  var randomAmount = Math.floor(Math.random() * 5000000); // Tính số tiền lì xì ngẫu nhiên từ 0 đến 999
  var resultElement = document.getElementById("result");
  if (Math.random() < 0.7) {
    resultElement.innerHTML = "Chúc mừng! Số tiền lì xì của bạn là " + randomAmount + " VNĐ.";
  } else {
    resultElement.innerHTML = "Rất tiếc! Không có tiền lì xì cho bạn năm nay.";
  }
}


</script>
