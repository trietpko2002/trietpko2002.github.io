<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trò chơi nhận bao lì xì</title>
<link rel="stylesheet" type="text/css" href="style.css">
</head>
<style>
body {
  font-family: Arial, sans-serif;
  background-color: #f4f4f4;
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
    text-align: center;
    margin-top: 100px;
}

h2 {
    color: white;
}

button {
    background-color: red;
    color: white;
    border: none;
    padding: 10px 20px;
    text-align: center;
    text-decoration: none;
    display: inline-block;
    font-size: 16px;
    margin: 4px 2px;
    cursor: pointer;
    border-radius: 8px;
    transition: background-color 0.3s ease;
}

button:hover {
    background-color: red;
}

#ketQua {
    font-size: 18px;
    color: white;
    margin-top: 20px;
}

.bao-lix {
    display: inline-block;
    width: 80px;
    height: 80px;
    background-color: #ffd700;
    border-radius: 50%;
    margin: 10px;
    position: relative;
    animation: moBaoLiXi 0.5s ease;
}

@keyframes moBaoLiXi {
    0% {
        transform: translateY(-100%);
        opacity: 0;
    }
    100% {
        transform: translateY(0);
        opacity: 1;
    }
}
video {
        position: fixed;
        top: 50%;
        left: 50%;
        min-width: 100%;
        min-height: 100%;
        width: auto;
        height: auto;
        z-index: -1000;
        transform: translateX(-50%) translateY(-50%);
        filter: brightness(70%);
    }
    .navbar {
  overflow: hidden;
  width: 100%;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 1000;
}


.navbar a {
  float: left;
  display: block;
  color: white;
  text-align: center;
  padding: 14px 20px;
  text-decoration: none;
}


.navbar a.active {
  background-color: red;
  color: white;
}

header {
  position: fixed; /* Đặt phần tử ở vị trí cố định */
  top: 0; /* Đặt phần tử ở đỉnh trang */
  left: 0;
  width: 100%;
  background-color: red;
  color: #fff;
  padding: 10px 0;
}

.running-text-container {
  overflow: hidden; /* Ẩn phần chữ vượt ra khỏi phần tử cha */
}

.running-text {
  display: inline-block;
  margin: 0;
  animation: running-text 30s linear infinite;
}

@keyframes running-text {
  0% {
    transform: translateX(100%); /* Di chuyển chữ từ phải sang trái */
  }
  100% {
    transform: translateX(-100%); /* Di chuyển chữ qua lại từ trái sang phải */
  }
}

.footer-buttons {
    
    color: #fff;
    padding: 20px;
    text-align: center;
}
.footer-buttons button {
    background-color: #d93838;
    color: #fff;
    border: none;
    padding: 10px 20px;
    margin: 0 10px;
    cursor: pointer;
    transition: background-color 0.3s;
}
.footer-buttons button:hover {
    background-color: #c72e2e;
}

.button {
  background-color: red; 
  border: none;
  color: white; 
  padding: 15px 32px;
  text-align: center;
  text-decoration: none;
  display: inline-block;
  font-size: 16px;
  margin: 4px 2px;
  cursor: pointer;
  border-radius: 10px; 
  }
.button {
  font-size: 1em;
  padding: 10px;
  color: #fff;
  border: 2px solid yellow;
  border-radius: 20px/50px;
  text-decoration: none;
  cursor: pointer;
  transition: all 0.3s ease-out;
}
.button:hover {
  background: #FFCC00;
}
</style>
<body>
<div>
    <video autoplay loop muted>
        <source src="fireworks loop.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <audio autoplay loop>
        <source src="Thần Tài Đến Remix - TLong x H2O (Nhạc Xuân 2024)  Thần Tài Đến Thần Tài Đến Hãy Giang Tay Đón Mời.mp3" type="audio/mp3">
        Your browser does not support the audio tag.
    </audio>
</div>
<header>
    <div class="running-text-container">
      <p class="running-text">Chúc mừng năm mới - Xuân Giáp Thìn 2024! - Mọi người đi chơi tết an toàn nhé! - Tuân thủ luật lệ giao thông và đã uống rượu bia, không lái xe! Có uống bia thì hãy bắt Grab hoặc xe Taxi nhé!</p>
    </div>
</header>
<div class="container">
    <h2>Trò chơi nhận bao lì xì</h2>
    <button onclick="moBaoLiXi()" class="button">Mở</button>
    <p id="ketQua"></p>
    <a href="index.html" class="button"><i class="fa fa-reply" aria-hidden="true"></i>Trở về</a>
</div>
<script>
function moBaoLiXi() {
    var tyLeTrung = 0.8; 
    var soBaoLiXi = 10; 
    var giaTriBaoLiXi = 100000; 

    var soNgauNhien = Math.random(); 
    var coTrung = soNgauNhien < tyLeTrung; 

    if (coTrung) {
        var baoLiXiTrung = Math.floor(Math.random() * soBaoLiXi) + 2; 
        var tienThuong = giaTriBaoLiXi * baoLiXiTrung;
        document.getElementById("ketQua").innerHTML = "Chúc mừng! Bạn đã trúng bao lì xì số " + baoLiXiTrung + " và nhận được " + tienThuong.toLocaleString() + " VND.";
    } else {
        document.getElementById("ketQua").innerHTML = "Rất tiếc! Bạn không trúng bao lì xì và nhận 1 cái nịt :)).";
    }
}
function hienBaoLiXi(soBaoLiXi) {
    var baoLiXiElement = document.createElement("div");
    baoLiXiElement.className = "bao-lix";
    baoLiXiElement.innerHTML = soBaoLiXi;
    document.body.appendChild(baoLiXiElement);
}
</script>

</body>
</html>
