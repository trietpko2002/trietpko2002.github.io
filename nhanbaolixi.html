    <h2>Trò chơi nhận bao lì xì</h2>
    <button onclick="moBaoLiXi()">Mở</button>
    <p id="ketQua"></p>
</div>

<script>
function moBaoLiXi() {
    var tyLeTrung = 0.3; // Tỉ lệ trúng, có thể thay đổi
    var soBaoLiXi = 10; // Số lượng bao lì xì
    var giaTriBaoLiXi = 100000; // Giá trị của mỗi bao lì xì (ví dụ: 100,000 VND)

    var soNgauNhien = Math.random(); // Số ngẫu nhiên từ 0 đến 1
    var coTrung = soNgauNhien < tyLeTrung; // Kiểm tra xem có trúng không

    if (coTrung) {
        var baoLiXiTrung = Math.floor(Math.random() * soBaoLiXi) + 1; // Chọn một số ngẫu nhiên từ 1 đến số bao lì xì
        var tienThuong = giaTriBaoLiXi * baoLiXiTrung;
        document.getElementById("ketQua").innerHTML = "Chúc mừng! Bạn đã trúng bao lì xì số " + baoLiXiTrung + " và nhận được " + tienThuong.toLocaleString() + " VND.";
    } else {
        document.getElementById("ketQua").innerHTML = "Rất tiếc! Bạn không trúng bao lì xì lần này.";
    }
}
function moBaoLiXi() {
    var tyLeTrung = 0.8; // Tỉ lệ trúng, có thể thay đổi
    var soBaoLiXi = 10; // Số lượng bao lì xì
    var giaTriBaoLiXi = 100000; // Giá trị của mỗi bao lì xì (ví dụ: 100,000 VND)

    var soNgauNhien = Math.random(); // Số ngẫu nhiên từ 0 đến 1
    var coTrung = soNgauNhien < tyLeTrung; // Kiểm tra xem có trúng không

    if (coTrung) {
        var baoLiXiTrung = Math.floor(Math.random() * soBaoLiXi) + 2; // Chọn một số ngẫu nhiên từ 1 đến số bao lì xì
        var tienThuong = giaTriBaoLiXi * baoLiXiTrung;
        document.getElementById("ketQua").innerHTML = "Chúc mừng! Bạn đã trúng bao lì xì số " + baoLiXiTrung + " và nhận được " + tienThuong.toLocaleString() + " VND.";
    } else {
        document.getElementById("ketQua").innerHTML = "Rất tiếc! Bạn không trúng bao lì xì lần này.";
    }
}
function hienBaoLiXi(soBaoLiXi) {
    var baoLiXiElement = document.createElement("div");
    baoLiXiElement.className = "bao-lix";
    baoLiXiElement.innerHTML = soBaoLiXi;
    document.body.appendChild(baoLiXiElement);
}
