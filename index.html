<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>YouTube Downloader</h1>
        <input type="text" id="videoURL" placeholder="Paste YouTube URL here" />
        <button id="getVideoBtn">Get Video Links</button>
        
        <div id="results" class="hidden">
            <h2>Select Quality</h2>
            <div id="qualityOptions"></div>
        </div>

        <div id="mp3Download" class="hidden">
            <button id="downloadMP3Btn">Download MP3</button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
