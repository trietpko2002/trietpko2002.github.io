<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Đại hội</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="img/logo_chinh_thuc.ico">
   
</head>
<body>
    <audio autoplay loop>
        <source src="nhac_nen.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
      
    <div class="countdown-container">
        <H2 style="color: blue; text-shadow: 2px 2px 4px white;"><strong>CHÀO MỪNG ĐẠI HỘI ĐẠI BIỂU ĐOÀN TNCS HỒ CHÍ MINH<br>TRƯỜNG CAO ĐẲNG NGHỀ NINH THUẬN LẦN THỨ X, NHIỆM KỲ 2024 - 2027</strong></h2>
        <img src="img/logo_chinh_thuc.png" alt="Logo trường" class="logo">
        <a href="https://khunghinh.net/p/khungchaomungdaihoi" class="btn-add-link">Link Khung Ảnh Đại Hội </a>
        <p style="color: blue; text-shadow: 2px 2px 4px white;"><strong>Thời gian đếm ngược đại hội</strong></p>
        <div class="countdown">
            <div>
                <span id="days"></span>
                <p>Ngày</p>
            </div>
            <div>
                <span id="hours"></span>
                <p>Giờ</p>
            </div>
            <div>
                <span id="minutes"></span>
                <p>Phút</p>
            </div>
            <div>
                <span id="seconds"></span>
                <p>Giây</p>
            </div>
        </div>
    </div>
    <script>
        const countDownDate = new Date("December 14, 2024 07:00:00").getTime();
        const x = setInterval(function() {

            const now = new Date().getTime();

            const distance = countDownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerHTML = days;
            document.getElementById("hours").innerHTML = hours;
            document.getElementById("minutes").innerHTML = minutes;
            document.getElementById("seconds").innerHTML = seconds;

            if (distance < 0) {
                clearInterval(x);
                document.getElementById("demo").innerHTML = "EXPIRED";
            }
        }, 1000);
        window.onload = function() {
    document.documentElement.requestFullscreen();
  };
  alert("Để trải nghiệm tốt nhất, vui lòng không để chế độ fullscreen, vì fullscreen nó bị lệch khung!");

    </script>
    <footer class="footer">
        <p>Code bởi: Võ Nguyễn Nhật Triết - Cựu sinh viên Cao đẳng QTMMT K20<br>
        <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ&pp=ygUXbmV2ZXIgZ29ubmEgZ2l2ZSB5b3UgdXA%3D">Soucre code tải tại đây</a></p>
      </footer>
</body>
</html>
